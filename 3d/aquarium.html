<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive 3D Aquarium</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            overflow: hidden;
            background: linear-gradient(135deg, #001a33 0%, #003366 50%, #001a33 100%);
        }
        canvas {
            display: block;
        }
        #info {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.7);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 14px;
            text-align: center;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="info">Drag to rotate • Scroll to zoom</div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x001a33);
        scene.fog = new THREE.FogExp2(0x001a33, 0.02);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 2, 12);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        const orbitControls = {
            enabled: true,
            target: new THREE.Vector3(0, 0, 0),
            spherical: { radius: 12, phi: Math.PI / 2, theta: 0 },
            sphericalDelta: { radius: 0, phi: 0, theta: 0 },
            scale: 1,
            rotateSpeed: 0.8,
            zoomSpeed: 1.2,
            minDistance: 5,
            maxDistance: 30,
            isDragging: false,
            startX: 0,
            startY: 0,

            update: function() {
                this.spherical.theta += this.sphericalDelta.theta;
                this.spherical.phi += this.sphericalDelta.phi;
                this.spherical.phi = Math.max(0.3, Math.min(Math.PI - 0.3, this.spherical.phi));
                this.spherical.radius *= this.scale;
                this.spherical.radius = Math.max(this.minDistance, Math.min(this.maxDistance, this.spherical.radius));
                this.scale = 1;
                this.sphericalDelta.theta *= 0.85;
                this.sphericalDelta.phi *= 0.85;

                const offset = new THREE.Vector3();
                offset.setFromSpherical(this.spherical);
                camera.position.copy(this.target).add(offset);
                camera.lookAt(this.target);
            }
        };

        document.addEventListener('mousedown', (e) => {
            orbitControls.isDragging = true;
            orbitControls.startX = e.clientX;
            orbitControls.startY = e.clientY;
        });

        document.addEventListener('mousemove', (e) => {
            if (!orbitControls.isDragging) return;
            const deltaX = e.clientX - orbitControls.startX;
            const deltaY = e.clientY - orbitControls.startY;
            orbitControls.sphericalDelta.theta -= deltaX * 0.005 * orbitControls.rotateSpeed;
            orbitControls.sphericalDelta.phi -= deltaY * 0.005 * orbitControls.rotateSpeed;
            orbitControls.startX = e.clientX;
            orbitControls.startY = e.clientY;
        });

        document.addEventListener('mouseup', () => {
            orbitControls.isDragging = false;
        });

        document.addEventListener('wheel', (e) => {
            e.preventDefault();
            orbitControls.scale *= e.deltaY > 0 ? 1.1 : 0.9;
        }, { passive: false });

        const ambientLight = new THREE.AmbientLight(0x4488aa, 0.4);
        scene.add(ambientLight);

        const topLight = new THREE.DirectionalLight(0x88ccff, 0.6);
        topLight.position.set(5, 15, 5);
        topLight.castShadow = true;
        topLight.shadow.mapSize.width = 1024;
        topLight.shadow.mapSize.height = 1024;
        scene.add(topLight);

        const bottomLight = new THREE.PointLight(0x0066aa, 0.5, 30);
        bottomLight.position.set(0, -8, 0);
        scene.add(bottomLight);

        const frontLight = new THREE.PointLight(0x44aaff, 0.4, 25);
        frontLight.position.set(0, 2, 10);
        scene.add(frontLight);

        const tankWidth = 10;
        const tankHeight = 6;
        const tankDepth = 6;
        const glassThickness = 0.1;

        const glassMaterial = new THREE.MeshPhysicalMaterial({
            color: 0x88ccff,
            transparent: true,
            opacity: 0.15,
            roughness: 0.05,
            metalness: 0.1,
            transmission: 0.9,
            thickness: 0.5,
            side: THREE.DoubleSide
        });

        const tankGeometry = new THREE.BoxGeometry(tankWidth, tankHeight, tankDepth);
        const tankSides = new THREE.Mesh(tankGeometry, glassMaterial);
        tankSides.castShadow = true;
        tankSides.receiveShadow = true;
        scene.add(tankSides);

        const edgeGeometry = new THREE.EdgesGeometry(tankGeometry);
        const edgeMaterial = new THREE.LineBasicMaterial({ color: 0x4488aa, linewidth: 2 });
        const tankEdges = new THREE.LineSegments(edgeGeometry, edgeMaterial);
        scene.add(tankEdges);

        const waterGeometry = new THREE.BoxGeometry(tankWidth - 0.3, tankHeight - 0.3, tankDepth - 0.3);
        const waterMaterial = new THREE.MeshPhysicalMaterial({
            color: 0x0066aa,
            transparent: true,
            opacity: 0.2,
            roughness: 0.1,
            metalness: 0,
            transmission: 0.8,
            side: THREE.BackSide
        });
        const water = new THREE.Mesh(waterGeometry, waterMaterial);
        scene.add(water);

        const sandGeometry = new THREE.BoxGeometry(tankWidth - 0.4, 0.5, tankDepth - 0.4);
        const sandMaterial = new THREE.MeshStandardMaterial({
            color: 0xc4a35a,
            roughness: 0.9,
            metalness: 0.1
        });
        const sand = new THREE.Mesh(sandGeometry, sandMaterial);
        sand.position.y = -tankHeight / 2 + 0.25;
        sand.receiveShadow = true;
        scene.add(sand);

        const rockGeometry = new THREE.DodecahedronGeometry(0.4, 1);
        const rockMaterial = new THREE.MeshStandardMaterial({
            color: 0x555555,
            roughness: 0.8,
            metalness: 0.2
        });

        for (let i = 0; i < 8; i++) {
            const rock = new THREE.Mesh(rockGeometry, rockMaterial);
            rock.position.set(
                (Math.random() - 0.5) * (tankWidth - 1.5),
                -tankHeight / 2 + 0.3 + Math.random() * 0.3,
                (Math.random() - 0.5) * (tankDepth - 1.5)
            );
            rock.rotation.set(Math.random() * Math.PI, Math.random() * Math.PI, Math.random() * Math.PI);
            rock.scale.setScalar(0.5 + Math.random() * 1);
            rock.castShadow = true;
            rock.receiveShadow = true;
            scene.add(rock);
        }

        const plantGeometry = new THREE.ConeGeometry(0.15, 1.5, 8);
        const plantMaterial = new THREE.MeshStandardMaterial({
            color: 0x228844,
            roughness: 0.6,
            side: THREE.DoubleSide
        });

        for (let i = 0; i < 12; i++) {
            const plant = new THREE.Mesh(plantGeometry, plantMaterial);
            const x = (Math.random() - 0.5) * (tankWidth - 2);
            const z = (Math.random() - 0.5) * (tankDepth - 2);
            plant.position.set(x, -tankHeight / 2 + 0.75, z);
            plant.rotation.x = (Math.random() - 0.5) * 0.3;
            plant.rotation.z = (Math.random() - 0.5) * 0.3;
            scene.add(plant);
        }

        const bubbleGeometry = new THREE.SphereGeometry(0.05, 8, 8);
        const bubbleMaterial = new THREE.MeshBasicMaterial({
            color: 0xaaddff,
            transparent: true,
            opacity: 0.4
        });

        const bubbles = [];
        for (let i = 0; i < 30; i++) {
            const bubble = new THREE.Mesh(bubbleGeometry, bubbleMaterial);
            bubble.position.set(
                (Math.random() - 0.5) * (tankWidth - 1),
                -tankHeight / 2 + Math.random() * tankHeight,
                (Math.random() - 0.5) * (tankDepth - 1)
            );
            bubble.scale.setScalar(0.5 + Math.random() * 1.5);
            bubble.userData.speed = 0.01 + Math.random() * 0.03;
            bubble.userData.wobble = Math.random() * Math.PI * 2;
            bubbles.push(bubble);
            scene.add(bubble);
        }

        function createFish(color, size) {
            const fishGroup = new THREE.Group();

            const bodyGeometry = new THREE.SphereGeometry(1, 16, 12);
            bodyGeometry.scale(1.3, 0.6, 0.4);
            const bodyMaterial = new THREE.MeshStandardMaterial({
                color: color,
                roughness: 0.3,
                metalness: 0.4
            });
            const body = new THREE.Mesh(bodyGeometry, bodyMaterial);
            body.castShadow = true;
            fishGroup.add(body);

            const tailGeometry = new THREE.ConeGeometry(0.4, 0.8, 8);
            const tailMaterial = new THREE.MeshStandardMaterial({
                color: color,
                roughness: 0.3,
                metalness: 0.4
            });
            const tail = new THREE.Mesh(tailGeometry, tailMaterial);
            tail.rotation.z = Math.PI / 2;
            tail.position.x = -1.2;
            tail.castShadow = true;
            fishGroup.add(tail);

            const dorsalGeometry = new THREE.ConeGeometry(0.25, 0.5, 6);
            const dorsal = new THREE.Mesh(dorsalGeometry, tailMaterial);
            dorsal.position.set(0.1, 0.5, 0);
            fishGroup.add(dorsal);

            const eyeGeometry = new THREE.SphereGeometry(0.12, 8, 8);
            const eyeMaterial = new THREE.MeshBasicMaterial({ color: 0xffffff });
            const pupilGeometry = new THREE.SphereGeometry(0.06, 6, 6);
            const pupilMaterial = new THREE.MeshBasicMaterial({ color: 0x000000 });

            const leftEye = new THREE.Mesh(eyeGeometry, eyeMaterial);
            leftEye.position.set(0.7, 0.15, 0.3);
            fishGroup.add(leftEye);

            const leftPupil = new THREE.Mesh(pupilGeometry, pupilMaterial);
            leftPupil.position.set(0.78, 0.15, 0.32);
            fishGroup.add(leftPupil);

            const rightEye = new THREE.Mesh(eyeGeometry, eyeMaterial);
            rightEye.position.set(0.7, 0.15, -0.3);
            fishGroup.add(rightEye);

            const rightPupil = new THREE.Mesh(pupilGeometry, pupilMaterial);
            rightPupil.position.set(0.78, 0.15, -0.32);
            fishGroup.add(rightPupil);

            fishGroup.scale.setScalar(size);

            return fishGroup;
        }

        const fishColors = [
            0xff6644,
            0xffaa33,
            0x44aaff,
            0xff44aa,
            0x44ff88,
            0xaa44ff,
            0xffff44
        ];

        const fishes = [];
        const bounds = {
            x: tankWidth / 2 - 1.5,
            y: tankHeight / 2 - 1,
            z: tankDepth / 2 - 1.5
        };

        for (let i = 0; i < 7; i++) {
            const color = fishColors[i % fishColors.length];
            const size = 0.4 + Math.random() * 0.3;
            const fish = createFish(color, size);

            fish.position.set(
                (Math.random() - 0.5) * bounds.x * 2,
                (Math.random() - 0.5) * bounds.y * 2,
                (Math.random() - 0.5) * bounds.z * 2
            );

            fish.userData.velocity = new THREE.Vector3(
                (Math.random() - 0.5) * 0.05,
                (Math.random() - 0.5) * 0.02,
                (Math.random() - 0.5) * 0.05
            );
            fish.userData.targetVelocity = fish.userData.velocity.clone();
            fish.userData.turnTimer = Math.random() * 100;
            fish.userData.baseSpeed = 0.03 + Math.random() * 0.02;
            fish.userData.maxSpeed = 0.08;
            fish.userData.wobble = Math.random() * Math.PI * 2;

            fishes.push(fish);
            scene.add(fish);
        }

        function updateFish(fish, deltaTime) {
            const userData = fish.userData;

            userData.turnTimer -= deltaTime * 0.001;

            if (userData.turnTimer <= 0) {
                userData.turnTimer = 2 + Math.random() * 4;

                userData.targetVelocity.set(
                    (Math.random() - 0.5) * userData.maxSpeed,
                    (Math.random() - 0.5) * userData.maxSpeed * 0.3,
                    (Math.random() - 0.5) * userData.maxSpeed
                );
            }

            userData.velocity.lerp(userData.targetVelocity, 0.02);

            const speed = userData.velocity.length();
            if (speed > userData.maxSpeed) {
                userData.velocity.multiplyScalar(userData.maxSpeed / speed);
            }

            fish.position.add(userData.velocity);

            if (Math.abs(fish.position.x) > bounds.x) {
                fish.position.x = Math.sign(fish.position.x) * bounds.x;
                userData.targetVelocity.x *= -1;
                userData.velocity.x *= -1;
            }
            if (Math.abs(fish.position.y) > bounds.y) {
                fish.position.y = Math.sign(fish.position.y) * bounds.y;
                userData.targetVelocity.y *= -1;
                userData.velocity.y *= -1;
            }
            if (Math.abs(fish.position.z) > bounds.z) {
                fish.position.z = Math.sign(fish.position.z) * bounds.z;
                userData.targetVelocity.z *= -1;
                userData.velocity.z *= -1;
            }

            userData.wobble += deltaTime * 0.005;
            fish.position.y += Math.sin(userData.wobble) * 0.003;

            const targetAngle = Math.atan2(userData.velocity.x, userData.velocity.z);
            let currentAngle = fish.rotation.y;
            let angleDiff = targetAngle - currentAngle;

            while (angleDiff > Math.PI) angleDiff -= Math.PI * 2;
            while (angleDiff < -Math.PI) angleDiff += Math.PI * 2;

            fish.rotation.y += angleDiff * 0.05;

            const tiltAngle = userData.velocity.z * 15;
            fish.rotation.z = THREE.MathUtils.lerp(fish.rotation.z, tiltAngle, 0.1);
        }

        function updateBubbles(deltaTime) {
            bubbles.forEach(bubble => {
                bubble.position.y += bubble.userData.speed;
                bubble.userData.wobble += deltaTime * 0.003;
                bubble.position.x += Math.sin(bubble.userData.wobble) * 0.002;

                if (bubble.position.y > tankHeight / 2 - 0.5) {
                    bubble.position.y = -tankHeight / 2 + 0.5;
                    bubble.position.x = (Math.random() - 0.5) * (tankWidth - 1);
                    bubble.position.z = (Math.random() - 0.5) * (tankDepth - 1);
                }
            });
        }

        let lastTime = 0;
        function animate(currentTime) {
            requestAnimationFrame(animate);

            const deltaTime = currentTime - lastTime;
            lastTime = currentTime;

            orbitControls.update();

            fishes.forEach(fish => updateFish(fish, deltaTime));

            updateBubbles(deltaTime);

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate(0);
    </script>
</body>
</html>
